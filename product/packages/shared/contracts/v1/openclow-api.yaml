openapi: 3.1.0
info:
  title: OpenClow API
  version: 1.0.0
  description: >
    API minima do MVP para capabilities, runs, checkpoints, approvals e outputs.
    Mutating requests carry actor/requested_by/workspace_slug in the current MVP
    until dedicated session and identity headers are introduced.
    Creative workflows may also declare machine_profile, environment_scope
    and artifact contracts inside the public schemas.
servers:
  - url: https://openclow.local/v1
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Runtime and storage health
  /capabilities:
    get:
      summary: List capabilities
      responses:
        "200":
          description: Capability list
    post:
      summary: Create capability
      responses:
        "201":
          description: Capability created
  /squads:
    get:
      summary: List squads
      responses:
        "200":
          description: Squad collection
  /capabilities/{capabilityId}:
    get:
      summary: Get capability
      parameters:
        - $ref: "#/components/parameters/CapabilityId"
      responses:
        "200":
          description: Capability payload
    patch:
      summary: Update capability
      parameters:
        - $ref: "#/components/parameters/CapabilityId"
      responses:
        "200":
          description: Capability updated
  /capabilities/{capabilityId}/promotions:
    get:
      summary: List promotions for a capability
      parameters:
        - $ref: "#/components/parameters/CapabilityId"
      responses:
        "200":
          description: Promotion collection
    post:
      summary: Request promotion or rollback for a capability
      parameters:
        - $ref: "#/components/parameters/CapabilityId"
      responses:
        "202":
          description: Promotion queued for approval
  /promotions:
    get:
      summary: List promotions
      responses:
        "200":
          description: Promotion collection
  /promotions/{promotionId}/approve:
    post:
      summary: Approve promotion
      parameters:
        - $ref: "#/components/parameters/PromotionId"
      responses:
        "200":
          description: Promotion approved
  /promotions/{promotionId}/reject:
    post:
      summary: Reject promotion
      parameters:
        - $ref: "#/components/parameters/PromotionId"
      responses:
        "200":
          description: Promotion rejected
  /audit:
    get:
      summary: List audit events
      responses:
        "200":
          description: Audit event collection
  /history:
    get:
      summary: List run history events
      responses:
        "200":
          description: History collection
  /runs:
    post:
      summary: Start run
      responses:
        "202":
          description: Run accepted
    get:
      summary: List runs
      responses:
        "200":
          description: Run collection
  /runs/{runId}:
    get:
      summary: Get run state
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run payload
  /runs/{runId}/outputs:
    get:
      summary: Get run outputs
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Output collection
  /checkpoints:
    get:
      summary: List checkpoints
      responses:
        "200":
          description: Checkpoint collection
  /checkpoints/{checkpointId}/approve:
    post:
      summary: Approve checkpoint
      parameters:
        - $ref: "#/components/parameters/CheckpointId"
      responses:
        "200":
          description: Checkpoint approved
  /checkpoints/{checkpointId}/reject:
    post:
      summary: Reject checkpoint
      parameters:
        - $ref: "#/components/parameters/CheckpointId"
      responses:
        "200":
          description: Checkpoint rejected
  /runtime:
    get:
      summary: Get runtime status
      responses:
        "200":
          description: Runtime payload
  /runtime/ollama/probe:
    post:
      summary: Probe Ollama runtime
      responses:
        "200":
          description: Ollama status
  /worker/claim:
    get:
      summary: Claim next runnable run
      responses:
        "200":
          description: Claimed run or null
  /worker/runs/{runId}/tick:
    post:
      summary: Tick run execution
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run tick result
components:
  parameters:
    CapabilityId:
      name: capabilityId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PromotionId:
      name: promotionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CheckpointId:
      name: checkpointId
      in: path
      required: true
      schema:
        type: string
        format: uuid
