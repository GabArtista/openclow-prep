<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClow Dashboard</title>
    <style>
      :root {
        --bg: #f2efe8;
        --panel: #fffaf1;
        --line: #d8d0c1;
        --text: #1f2a22;
        --muted: #5a655d;
        --accent: #0e8b63;
        --warn: #b15b29;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top left, rgba(14, 139, 99, 0.12), transparent 30%),
          linear-gradient(180deg, #f7f3ea, var(--bg));
        color: var(--text);
      }

      header {
        padding: 24px;
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2 {
        margin: 0 0 8px;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
        padding: 16px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(31, 42, 34, 0.06);
      }

      ul {
        padding-left: 18px;
      }

      li {
        margin-bottom: 10px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .checkpoint {
        border-left: 3px solid var(--warn);
        padding-left: 12px;
      }

      button {
        margin-right: 8px;
        border: 1px solid var(--line);
        background: white;
        padding: 8px 12px;
        border-radius: 999px;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OpenClow Local Control Plane</h1>
      <div class="meta">
        Core server-first inicial para o workspace `doze`, preservando a operação atual na raiz do repositório.
      </div>
    </header>
    <main>
      <section>
        <h2>Squads</h2>
        <ul id="squads"></ul>
      </section>
      <section>
        <h2>Capabilities</h2>
        <ul id="capabilities"></ul>
      </section>
      <section>
        <h2>Runs</h2>
        <div class="meta">Use o endpoint `POST /v1/runs` ou o helper abaixo para disparar um run.</div>
        <p>
          <button class="primary" data-squad="marketing-dozecrew">Rodar marketing</button>
          <button class="primary" data-squad="inteligencia-dozecrew">Rodar inteligência</button>
        </p>
        <ul id="runs"></ul>
      </section>
      <section>
        <h2>Checkpoints</h2>
        <ul id="checkpoints"></ul>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
